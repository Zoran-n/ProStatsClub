name: CD

on:
  push:
    branches: [main]

jobs:
  check-ci:
    name: Vérification CI Fast + CI E2E
    runs-on: ubuntu-latest
    outputs:
      all_green: ${{ steps.check.outputs.all_green }}
    steps:
      - name: Attendre et vérifier CI Fast et CI E2E
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          WORKFLOWS=("CI Fast" "CI E2E")
          TIMEOUT=1800  # 30 minutes max
          INTERVAL=30
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            ALL_GREEN=true
            for WF in "${WORKFLOWS[@]}"; do
              STATUS=$(gh api "repos/$REPO/commits/$SHA/check-runs" \
                --jq "[.check_runs[] | select(.name == \"$WF\")] | sort_by(.started_at) | last | .conclusion" \
                2>/dev/null || echo "pending")
              echo "[$WF] conclusion: $STATUS"
              if [ "$STATUS" != "success" ]; then
                ALL_GREEN=false
                if [ "$STATUS" == "failure" ] || [ "$STATUS" == "cancelled" ] || [ "$STATUS" == "timed_out" ]; then
                  echo "CI échouée ($WF: $STATUS) — abandon du déploiement."
                  echo "all_green=false" >> "$GITHUB_OUTPUT"
                  exit 0
                fi
              fi
            done
            if [ "$ALL_GREEN" == "true" ]; then
              echo "Toutes les CIs sont vertes."
              echo "all_green=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "En attente... ($ELAPSED s écoulées)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "Timeout atteint — les CIs n'ont pas terminé à temps."
          echo "all_green=false" >> "$GITHUB_OUTPUT"

  build-and-deploy-windows:
    name: Build & Deploy Windows
    needs: check-ci
    if: ${{ needs.check-ci.outputs.all_green == 'true' }}
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          cache-all-crates: "true"
          shared-key: "build-windows"

      - run: npm ci

      - name: Build complet avec installeur
        run: npm run tauri -- build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Signer, créer release et générer latest.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $version = (Get-Content "package.json" | ConvertFrom-Json).version
          $tag = "v$version"
          $repo = "${{ github.repository }}"

          $exe = Get-ChildItem "src-tauri/target/release/bundle/nsis" | Where-Object { $_.Name -match '-setup\.exe$' } | Select-Object -First 1
          if (-not $exe) { Write-Error "No NSIS exe found"; exit 1 }

          npm run tauri -- signer sign $exe.FullName
          $sigPath = "$($exe.FullName).sig"
          if (-not (Test-Path $sigPath)) { Write-Error "Signing failed"; exit 1 }
          $signature = [IO.File]::ReadAllText($sigPath).Trim()

          gh release create $tag --repo $repo --title "ProClubs Stats $tag" --notes "ProClubs Stats $tag"
          if ($LASTEXITCODE -ne 0) { Write-Host "Release $tag existe deja, mise a jour des assets." }

          gh release upload $tag $exe.FullName --repo $repo --clobber

          $msi = Get-ChildItem "src-tauri/target/release/bundle/msi" | Where-Object { $_.Name -match '\.msi$' } | Select-Object -First 1
          if ($msi) { gh release upload $tag $msi.FullName --repo $repo --clobber }

          $assetName = $exe.Name -replace ' ', '.'
          $url = "https://github.com/$repo/releases/download/$tag/$assetName"
          $date = Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ'
          $json = '{"version":"' + $version + '","notes":"' + $tag + '","pub_date":"' + $date + '","platforms":{"windows-x86_64":{"signature":"' + $signature + '","url":"' + $url + '"}}}'

          [IO.File]::WriteAllText("latest.json", $json)
          gh release upload $tag "latest.json" --repo $repo --clobber
          Write-Host "Done! Release $tag uploaded."
