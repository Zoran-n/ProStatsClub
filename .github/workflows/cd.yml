name: CD

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-and-deploy-windows:
    name: Build & Deploy Windows
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          shared-key: "build-windows"

      - run: npm ci
      - run: npm run build

      - name: Build complet avec installeur
        run: npm run tauri -- build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Signer, créer release et générer latest.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $version = (Get-Content "package.json" | ConvertFrom-Json).version
          $tag = "v$version"
          $repo = "${{ github.repository }}"

          $exe = Get-ChildItem "src-tauri/target/release/bundle/nsis" | Where-Object { $_.Name -match '-setup\.exe$' } | Select-Object -First 1
          if (-not $exe) { Write-Error "No NSIS exe found"; exit 1 }

          npm run tauri -- signer sign $exe.FullName
          $sigPath = "$($exe.FullName).sig"
          if (-not (Test-Path $sigPath)) { Write-Error "Signing failed"; exit 1 }
          $signature = [IO.File]::ReadAllText($sigPath).Trim()

          gh release create $tag --repo $repo --title "ProClubs Stats $tag" --notes "ProClubs Stats $tag"
          if ($LASTEXITCODE -ne 0) { Write-Host "Release $tag existe deja, mise a jour des assets." }

          gh release upload $tag $exe.FullName --repo $repo --clobber

          $msi = Get-ChildItem "src-tauri/target/release/bundle/msi" | Where-Object { $_.Name -match '\.msi$' } | Select-Object -First 1
          if ($msi) { gh release upload $tag $msi.FullName --repo $repo --clobber }

          $assetName = $exe.Name -replace ' ', '.'
          $url = "https://github.com/$repo/releases/download/$tag/$assetName"
          $date = Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ'
          $json = '{"version":"' + $version + '","notes":"' + $tag + '","pub_date":"' + $date + '","platforms":{"windows-x86_64":{"signature":"' + $signature + '","url":"' + $url + '"}}}'

          [IO.File]::WriteAllText("latest.json", $json)
          gh release upload $tag "latest.json" --repo $repo --clobber
          Write-Host "Done! Release $tag uploaded."
