name: Release (Production)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  tagging:
    name: 🏷️ Lecture du tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Lire la version depuis package.json
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NEW_TAG="v${VERSION}"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "### 🏷️ Tag : \`${NEW_TAG}\`" >> "$GITHUB_STEP_SUMMARY"

          # Si le tag n'existe pas encore sur le remote, le créer
          if git ls-remote --tags origin "refs/tags/${NEW_TAG}" | grep -q "${NEW_TAG}"; then
            echo "ℹ️  Tag ${NEW_TAG} déjà présent sur le remote — skip création" >> "$GITHUB_STEP_SUMMARY"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${NEW_TAG}" || true
            git push origin "${NEW_TAG}"
            echo "✅  Tag ${NEW_TAG} créé et poussé" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 📝 Générer les Release Notes
        run: |
          NEW_TAG="${{ steps.tag.outputs.new_tag }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${NEW_TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          COMMITS=$(git log "$RANGE" --pretty=format:"%s" \
            | grep -E "^(feat|fix)(\(.+\))?:" \
            | grep -vE "(explicit secrets|dynamic path|duplicate asset|configure tauri|allow discord|tauri signing|updater bundle)" \
            | sed 's/^feat[^:]*: /- ✨ /; s/^fix[^:]*: /- 🐛 /')

          {
            echo "## 🚀 Quoi de neuf dans ${NEW_TAG} ?"
            echo ""
            if [ -z "$COMMITS" ]; then
              echo "- Améliorations internes et corrections de stabilité"
            else
              echo "$COMMITS"
            fi
          } > RELEASE_NOTES.md

          echo "### 📝 Release Notes générées" >> $GITHUB_STEP_SUMMARY
          cat RELEASE_NOTES.md >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload Release Notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md
          retention-days: 1

  build-and-release:
    name: 🚀 Build & Release Windows
    runs-on: windows-latest
    needs: tagging
    permissions:
      contents: write
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 📥 Télécharger les Release Notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: 📥 Installer les dépendances Node
        shell: bash
        run: npm ci

      - name: 🔢 Vérifier la cohérence des versions
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          EXPECTED_TAG="v${PKG_VERSION}"
          ACTUAL_TAG="${{ needs.tagging.outputs.new_tag }}"

          echo "### 🔢 Versions" >> $GITHUB_STEP_SUMMARY
          echo "- package.json : \`${PKG_VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- tauri.conf.json : \`${TAURI_VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Tag de release : \`${ACTUAL_TAG}\`" >> $GITHUB_STEP_SUMMARY

          if [ "${TAURI_VERSION}" != "${PKG_VERSION}" ]; then
            echo "⚠️  Désynchronisation détectée — correction automatique de tauri.conf.json" >> $GITHUB_STEP_SUMMARY
            node -e "
              const fs = require('fs');
              const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
              conf.version = '${PKG_VERSION}';
              fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
            "
            sed -i "0,/^version = /s/^version = \".*\"/version = \"${PKG_VERSION}\"/" src-tauri/Cargo.toml
          else
            echo "✅ Toutes les versions sont synchronisées sur \`${PKG_VERSION}\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🔑 Vérifier la présence des secrets de signature
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "### ❌ ERREUR : TAURI_SIGNING_PRIVATE_KEY est vide ou absent" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          KEY_LEN=${#TAURI_SIGNING_PRIVATE_KEY}
          KEY_PREFIX="${TAURI_SIGNING_PRIVATE_KEY:0:20}"
          echo "### 🔑 Secret de signature" >> $GITHUB_STEP_SUMMARY
          echo "- Longueur : \`${KEY_LEN}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Préfixe (20 premiers chars) : \`${KEY_PREFIX}\`" >> $GITHUB_STEP_SUMMARY

      - name: 🔨 Build Tauri
        shell: bash
        run: |
          # tee: logs visible in real-time AND saved to build.log
          if ! npm run tauri build -- --bundles nsis,updater 2>&1 | tee build.log; then
            echo "### ❌ Échec : Build Tauri" >> $GITHUB_STEP_SUMMARY

            # Extract meaningful error lines (Rust errors, panics, TS errors)
            ERROR_LINES=$(grep -E "^error(\[E[0-9]+\])?:|^error |panic!|FAILED|Cannot find module|TS[0-9]{4}:" build.log || true)

            echo "<details><summary>🔍 Erreurs détectées (grep error/panic)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            if [ -n "$ERROR_LINES" ]; then
              echo "$ERROR_LINES" | head -n 40 >> $GITHUB_STEP_SUMMARY
            else
              echo "Aucune ligne error/panic trouvée — affichage des 60 dernières lignes :" >> $GITHUB_STEP_SUMMARY
              tail -n 60 build.log >> $GITHUB_STEP_SUMMARY
            fi
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: 📎 Upload build.log (si échec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ needs.tagging.outputs.new_tag }}
          path: build.log
          retention-days: 7

      - name: 🔔 Notification Discord (si échec)
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        shell: bash
        run: |
          node scripts/notify-discord.js \
            --log build.log \
            --status fail \
            --tag "${{ needs.tagging.outputs.new_tag }}" \
            --commit "${{ github.sha }}" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: 🔍 Debug — listing complet de target/release
        if: always()
        shell: bash
        run: |
          echo "### 📁 Contenu de src-tauri/target/release (récursif)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find src-tauri/target/release -not -path "*/deps/*" -not -path "*/.fingerprint/*" -not -path "*/incremental/*" -type f | sort >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 📝 Générer latest.json
        shell: bash
        run: |
          VERSION="${{ needs.tagging.outputs.new_tag }}"
          VERSION_BARE="${VERSION#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          REPO="Zoran-n/ProStatsClub"

          # Chercher le .sig et déduire l'archive associée
          SIG_FILE=$(find src-tauri/target/release/bundle -name "*.sig" | head -1)

          if [ -z "$SIG_FILE" ]; then
            echo "### ❌ ERREUR : Signature non générée. Vérifiez que TAURI_SIGNING_PRIVATE_KEY est bien passé au build Tauri." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          UPDATER_ARCHIVE="${SIG_FILE%.sig}"
          ZIP_NAME=$(basename "$UPDATER_ARCHIVE")
          # Encode les espaces en %20 pour une URL valide
          ZIP_NAME_ENCODED="${ZIP_NAME// /%20}"
          SIG_CONTENT=$(cat "$SIG_FILE")

          cat > latest.json <<EOF
          {
            "version": "${VERSION_BARE}",
            "notes": "Release ${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "url": "https://github.com/${REPO}/releases/download/${VERSION}/${ZIP_NAME_ENCODED}",
                "signature": "${SIG_CONTENT}"
              }
            }
          }
          EOF

          echo "### ✅ latest.json généré" >> $GITHUB_STEP_SUMMARY
          echo "- Version : \`${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Archive updater : \`${ZIP_NAME}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Signature : \`${SIG_FILE}\`" >> $GITHUB_STEP_SUMMARY

      - name: 🚀 Créer la GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ needs.tagging.outputs.new_tag }}"

          # Chercher le .sig et déduire l'archive — distinct du .exe installeur
          SIG_FILE=$(find src-tauri/target/release/bundle -name "*.sig" | head -1)
          UPDATER_ARCHIVE="${SIG_FILE%.sig}"
          # Le .exe installeur est distinct de l'archive updater
          NSIS_EXE=$(find src-tauri/target/release/bundle -name "*.exe" \
            ! -name "$(basename "$UPDATER_ARCHIVE")" | head -1)
          # Si UPDATER_ARCHIVE == NSIS_EXE (cas .exe.sig), ne l'ajouter qu'une fois
          if [ "$NSIS_EXE" = "$UPDATER_ARCHIVE" ] || [ -z "$NSIS_EXE" ]; then
            NSIS_EXE=""
          fi

          echo "### 📦 Fichiers à uploader" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          for f in "$NSIS_EXE" "$UPDATER_ARCHIVE" "$SIG_FILE" latest.json; do
            [ -z "$f" ] && continue
            if [ ! -f "$f" ]; then
              echo "INTROUVABLE : $f" >> $GITHUB_STEP_SUMMARY
            else
              ls -lh "$f" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Guard : archive et sig obligatoires
          if [ -z "$UPDATER_ARCHIVE" ] || [ ! -f "$UPDATER_ARCHIVE" ] || [ ! -f "$SIG_FILE" ]; then
            echo "### ❌ Abandon : archive updater ou signature manquante" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Supprimer la release existante (re-run propre)
          gh release delete "${VERSION}" --yes 2>/dev/null || true

          # Construire la liste des assets sans doublon
          ASSETS=()
          [ -n "$NSIS_EXE" ] && [ -f "$NSIS_EXE" ] && ASSETS+=("$NSIS_EXE")
          ASSETS+=("$UPDATER_ARCHIVE" "$SIG_FILE" latest.json)

          if ! gh release create "${VERSION}" \
            "${ASSETS[@]}" \
            --title "ProClubs Stats ${VERSION}" \
            --notes-file RELEASE_NOTES.md > release.log 2>&1; then
            echo "### ❌ Échec : Création de la GitHub Release" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>🔍 Voir les logs d'erreur</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            tail -n 30 release.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            cat release.log
            exit 1
          fi

  report:
    name: 📊 Rapport de Release
    runs-on: ubuntu-latest
    needs: [tagging, build-and-release]
    if: always()
    steps:
      - name: 📥 Récupérer le code (pour notify-discord.js)
        if: needs.build-and-release.result == 'success'
        uses: actions/checkout@v4

      - name: 📝 Générer le résumé Markdown
        run: |
          echo "# 📊 Rapport de Release" >> $GITHUB_STEP_SUMMARY
          echo "## 📌 Informations" >> $GITHUB_STEP_SUMMARY
          echo "- **Version** : \`${{ needs.tagging.outputs.new_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branche** : \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⚙️ Résultats" >> $GITHUB_STEP_SUMMARY
          echo "- 🏷️ Tagging : ${{ needs.tagging.result == 'success' && '✅ Succès' || '❌ Échec' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 Build & Release : ${{ needs.build-and-release.result == 'success' && '✅ Succès' || '❌ Échec' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 *Ce rapport a été généré automatiquement.*" >> $GITHUB_STEP_SUMMARY

      - name: 🎉 Notification Discord (succès)
        if: needs.build-and-release.result == 'success'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          node scripts/notify-discord.js \
            --status success \
            --tag "${{ needs.tagging.outputs.new_tag }}" \
            --commit "${{ github.sha }}" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
