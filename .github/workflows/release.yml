name: CI & Release
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  security:
    name: Sécurité
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - run: cargo install cargo-audit --quiet
      - run: cargo audit
        working-directory: src-tauri
        continue-on-error: true

  rust:
    name: Qualité Rust
    needs: security
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - run: cargo fmt --all -- --check
        working-directory: src-tauri
      - run: cargo clippy -- -D warnings
        working-directory: src-tauri
      - run: cargo test
        working-directory: src-tauri

  react-ts:
    name: Qualité React / TypeScript / Tauri2
    needs: security
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run type-check
      - run: npm run test
      - run: npm run build

  build:
    name: Build Windows
    needs: [rust, react-ts]
    if: github.event_name == 'push'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
      - run: npm ci
      - run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: windows-bundle
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/msi/*.msi

  release:
    name: Release Windows
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: windows-bundle
          path: bundle

      - name: Signer, créer release et générer latest.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $repo = "${{ github.repository }}"

          $exe = Get-ChildItem "bundle/nsis" | Where-Object { $_.Name -match '-setup\.exe$' } | Select-Object -First 1
          if (-not $exe) { Write-Error "No NSIS exe found"; exit 1 }

          npm run tauri -- signer sign $exe.FullName
          $sigPath = "$($exe.FullName).sig"
          if (-not (Test-Path $sigPath)) { Write-Error "Signing failed"; exit 1 }
          $signature = [IO.File]::ReadAllText($sigPath).Trim()

          gh release create $tag --repo $repo --title "ProClubs Stats $tag" --notes "ProClubs Stats $tag"

          gh release upload $tag $exe.FullName --repo $repo --clobber

          $msi = Get-ChildItem "bundle/msi" | Where-Object { $_.Name -match '\.msi$' } | Select-Object -First 1
          if ($msi) { gh release upload $tag $msi.FullName --repo $repo --clobber }

          $assetName = $exe.Name -replace ' ', '.'
          $url = "https://github.com/$repo/releases/download/$tag/$assetName"
          $date = Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ'
          $json = '{"version":"' + $version + '","notes":"' + $tag + '","pub_date":"' + $date + '","platforms":{"windows-x86_64":{"signature":"' + $signature + '","url":"' + $url + '"}}}'

          [IO.File]::WriteAllText("latest.json", $json)
          gh release upload $tag "latest.json" --repo $repo --clobber
          Write-Host "Done! Release $tag uploaded."
