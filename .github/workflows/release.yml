name: CI & Release
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # [1] Audit Node et Rust en parallèle (était séquentiel → +2min économisées)
  security-node:
    name: Sécurité Node
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true

  security-rust:
    name: Sécurité Rust
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit
        working-directory: src-tauri
        continue-on-error: true

  rust:
    name: Qualité Rust
    needs: security-rust
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - run: cargo fmt --all -- --check
        working-directory: src-tauri
      - run: cargo clippy -- -D warnings
        working-directory: src-tauri
      - run: cargo test
        working-directory: src-tauri

  # [4] Fast-fail : job minimal, aucune étape superflue, bloque build immédiatement
  type-check:
    name: TypeScript
    needs: security-node
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run type-check

  test:
    name: Tests
    needs: security-node
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test

  build-react:
    name: Build React
    needs: security-node
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # Partage le dist/ compilé pour éviter que Tauri le recompile
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # [2] Cache Rust agressif + réutilise le dist/ de build-react
  build:
    name: Build Windows
    needs: [rust, type-check, test, build-react]
    if: github.event_name == 'push'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          cache-all-crates: "true"
      - run: npm ci
      # Réutilise le frontend déjà compilé par build-react
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      # Override beforeBuildCommand à vide pour ne pas recompiler Vite
      - name: Config override (skip frontend build)
        shell: pwsh
        run: Set-Content -Path "tauri.override.conf.json" -Value '{"build":{"beforeBuildCommand":""}}' -Encoding UTF8
      # --no-bundle : compile uniquement le binaire, pas les installeurs
      - run: npm run tauri -- build --no-bundle --config tauri.override.conf.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  release:
    name: Release Windows
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          cache-all-crates: "true"

      - run: npm ci

      # Réutilise le frontend déjà compilé
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      # Override beforeBuildCommand à vide pour ne pas recompiler Vite
      - name: Config override (skip frontend build)
        shell: pwsh
        run: Set-Content -Path "tauri.override.conf.json" -Value '{"build":{"beforeBuildCommand":""}}' -Encoding UTF8

      # Build complet avec bundling (NSIS + MSI) mais sans recompiler le frontend
      - run: npm run tauri -- build --config tauri.override.conf.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Signer, créer release et générer latest.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $version = (Get-Content "package.json" | ConvertFrom-Json).version
          $tag = "v$version"
          $repo = "${{ github.repository }}"

          $exe = Get-ChildItem "src-tauri/target/release/bundle/nsis" | Where-Object { $_.Name -match '-setup\.exe$' } | Select-Object -First 1
          if (-not $exe) { Write-Error "No NSIS exe found"; exit 1 }

          npm run tauri -- signer sign $exe.FullName
          $sigPath = "$($exe.FullName).sig"
          if (-not (Test-Path $sigPath)) { Write-Error "Signing failed"; exit 1 }
          $signature = [IO.File]::ReadAllText($sigPath).Trim()

          gh release create $tag --repo $repo --title "ProClubs Stats $tag" --notes "ProClubs Stats $tag"
          if ($LASTEXITCODE -ne 0) { Write-Host "Release $tag existe deja, mise a jour des assets." }

          gh release upload $tag $exe.FullName --repo $repo --clobber

          $msi = Get-ChildItem "src-tauri/target/release/bundle/msi" | Where-Object { $_.Name -match '\.msi$' } | Select-Object -First 1
          if ($msi) { gh release upload $tag $msi.FullName --repo $repo --clobber }

          $assetName = $exe.Name -replace ' ', '.'
          $url = "https://github.com/$repo/releases/download/$tag/$assetName"
          $date = Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ'
          $json = '{"version":"' + $version + '","notes":"' + $tag + '","pub_date":"' + $date + '","platforms":{"windows-x86_64":{"signature":"' + $signature + '","url":"' + $url + '"}}}'

          [IO.File]::WriteAllText("latest.json", $json)
          gh release upload $tag "latest.json" --repo $repo --clobber
          Write-Host "Done! Release $tag uploaded."
