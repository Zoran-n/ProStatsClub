name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false

      - name: Générer latest.json pour l'auto-updater
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $repo = "${{ github.repository }}"

          $exe = Get-ChildItem "src-tauri/target/release/bundle/nsis" |
            Where-Object { $_.Name -match '\.exe$' } | Select-Object -First 1
          $signature = [IO.File]::ReadAllText("$($exe.FullName).sig").Trim()
          $assetName = $exe.Name -replace ' ', '.'
          $url = "https://github.com/$repo/releases/download/$tag/$assetName"

          $json = "{
            `"version`": `"$version`",
            `"notes`": `"`",
            `"pub_date`": `"$(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')`",
            `"platforms`": {
              `"windows-x86_64`": {
                `"signature`": `"$signature`",
                `"url`": `"$url`"
              }
            }
          }"

          [IO.File]::WriteAllText("latest.json", $json)
          gh release upload $tag "latest.json" --repo $repo --clobber
