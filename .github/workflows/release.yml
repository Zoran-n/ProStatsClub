name: Release (Production)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version à releaser (ex: v0.6.0)'
        required: true
        type: string

jobs:
  build-and-release:
    name: 🚀 Build & Release Windows
    runs-on: windows-latest
    if: github.ref == 'refs/heads/Main'
    permissions:
      contents: write

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: 📥 Installer les dépendances Node
        shell: bash
        run: npm ci

      - name: 🔨 Build Tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          if ! npm run tauri build > build.log 2>&1; then
            echo "### ❌ Échec : Build Tauri" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>🔍 Voir les logs d'erreur</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            tail -n 30 build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: 📝 Générer latest.json
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          REPO="Zoran-n/ProStatsClub"

          NSIS_EXE=$(find src-tauri/target/release/bundle/nsis -name "*.exe" | head -1)
          UPDATER_ZIP=$(find src-tauri/target/release/bundle/nsis -name "*.nsis.zip" | head -1)
          ZIP_NAME=$(basename "$UPDATER_ZIP")
          SIG_CONTENT=$(cat "${UPDATER_ZIP}.sig")

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Release ${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "url": "https://github.com/${REPO}/releases/download/${VERSION}/${ZIP_NAME}",
                "signature": "${SIG_CONTENT}"
              }
            }
          }
          EOF

          echo "### ✅ latest.json généré" >> $GITHUB_STEP_SUMMARY
          echo "- Version : \`${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Archive updater : \`${ZIP_NAME}\`" >> $GITHUB_STEP_SUMMARY

      - name: 🚀 Créer la GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          NSIS_EXE=$(find src-tauri/target/release/bundle/nsis -name "*.exe" | head -1)
          UPDATER_ZIP=$(find src-tauri/target/release/bundle/nsis -name "*.nsis.zip" | head -1)
          UPDATER_SIG="${UPDATER_ZIP}.sig"

          if ! gh release create ${{ github.event.inputs.version }} \
            "$NSIS_EXE" \
            "$UPDATER_ZIP" \
            "$UPDATER_SIG" \
            latest.json \
            --title "ProClubs Stats ${{ github.event.inputs.version }}" \
            --notes-file RELEASE_NOTES.md > release.log 2>&1; then
            echo "### ❌ Échec : Création de la GitHub Release" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>🔍 Voir les logs d'erreur</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            tail -n 30 release.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  report:
    name: 📊 Rapport de Release
    runs-on: ubuntu-latest
    needs: [build-and-release]
    if: always()
    steps:
      - name: 📝 Générer le résumé Markdown
        run: |
          echo "# 📊 Rapport de Release" >> $GITHUB_STEP_SUMMARY
          echo "## 📌 Informations" >> $GITHUB_STEP_SUMMARY
          echo "- **Version** : \`${{ github.event.inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branche** : \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⚙️ Résultat" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 Release : ${{ needs.build-and-release.result == 'success' && '✅ Succès' || '❌ Échec' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 *Ce rapport a été généré automatiquement.*" >> $GITHUB_STEP_SUMMARY
