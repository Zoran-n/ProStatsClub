name: Créer une PR (Dev ➡️ Main)

on:
  workflow_dispatch:

jobs:
  promote:
    name: 🔀 Créer la Pull Request
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Dev

      - name: Créer la Pull Request vers main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh pr create \
            --base Main \
            --head Dev \
            --title "🚀 Release: Mise à jour depuis Dev" \
            --body "Cette PR a été générée automatiquement. Merci de vérifier avant le merge." > pr.log 2>&1; then
            echo "### ❌ Échec : Création de la Pull Request" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>🔍 Voir les logs d'erreur</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            tail -n 30 pr.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  report:
    name: 📊 Rapport de PR
    runs-on: ubuntu-latest
    needs: [promote]
    if: always()
    steps:
      - name: 📝 Générer le résumé Markdown
        run: |
          echo "# 📊 Rapport de Création de Pull Request" >> $GITHUB_STEP_SUMMARY
          echo "## 📌 Informations" >> $GITHUB_STEP_SUMMARY
          echo "- **Branche source** : \`Dev\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branche cible** : \`Main\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Déclencheur** : \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit** : \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⚙️ Résultat" >> $GITHUB_STEP_SUMMARY
          echo "- 🔀 Création PR : ${{ needs.promote.result == 'success' && '✅ Succès' || '❌ Échec' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 *Ce rapport a été généré automatiquement.*" >> $GITHUB_STEP_SUMMARY
