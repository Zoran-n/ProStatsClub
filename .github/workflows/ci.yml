name: CI (Qualité)

on:
  pull_request:
    branches: [ "Dev", "Main" ]

jobs:
  lint-ts:
    name: 🧹 Lint TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: 🧹 Lint TypeScript
        run: |
          if ! npm run lint > lint_ts.log 2>&1; then
            echo "### ❌ Échec : Lint TypeScript" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>🔍 Voir les logs d'erreur</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            tail -n 30 lint_ts.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  cargo-check:
    name: 🦀 Cargo Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy, rustfmt }
      - name: 🛠️ Dépendances système Tauri / Linux
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: 🎨 Format Rust
        continue-on-error: true
        run: |
          if ! cargo fmt --all -- --check > fmt.log 2>&1; then
            echo "### ⚠️ Avertissement : Format Rust non conforme" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>🔍 Voir les différences</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            tail -n 30 fmt.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi
      - name: 📎 Cargo Check + Clippy
        run: |
          if ! cargo clippy -- -D warnings > clippy.log 2>&1; then
            echo "### ❌ Échec : Clippy" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>🔍 Voir les logs d'erreur</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            tail -n 30 clippy.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  report:
    name: 📊 Rapport de CI
    runs-on: ubuntu-latest
    needs: [lint-ts, cargo-check]
    if: always()
    steps:
      - name: 📝 Générer le résumé Markdown
        run: |
          echo "# 📊 Rapport CI — Pull Request" >> $GITHUB_STEP_SUMMARY
          echo "## 📌 Informations" >> $GITHUB_STEP_SUMMARY
          echo "- **Branche** : \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit** : \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⚙️ Résultats" >> $GITHUB_STEP_SUMMARY
          echo "- 🧹 Lint TS : ${{ needs.lint-ts.result == 'success' && '✅ Succès' || '❌ Échec' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🦀 Cargo Check : ${{ needs.cargo-check.result == 'success' && '✅ Succès' || '❌ Échec' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 *Ce rapport a été généré automatiquement.*" >> $GITHUB_STEP_SUMMARY
