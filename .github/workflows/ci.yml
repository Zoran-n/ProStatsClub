name: CI (Qualité & Tests)

on:
  push:
    branches: [ "Dev" ]
  pull_request:
    branches: [ "Dev" ]

jobs:
  lint-ts:
    name: 🧹 Lint TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run lint --if-present

  lint-rust:
    name: 🦀 Lint Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy, rustfmt }
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy -- -D warnings

  tests-unit:
    name: 🧪 Tests Unitaires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run test --if-present
      - run: cargo test

  tests-e2e:
    name: 🌐 Tests E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run test:e2e --if-present

  report:
    name: 📊 Rapport de CI
    runs-on: ubuntu-latest
    needs: [lint-ts, lint-rust, tests-unit, tests-e2e]
    if: always()
    steps:
      - name: 📝 Générer le résumé Markdown
        run: |
          echo "# 📊 Rapport d'Exécution de la CI" >> $GITHUB_STEP_SUMMARY
          echo "## 📌 Informations" >> $GITHUB_STEP_SUMMARY
          echo "- **Branche** : \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Déclencheur** : \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit** : \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⚙️ Résultats des Jobs" >> $GITHUB_STEP_SUMMARY
          echo "- 🧹 Lint TS : ${{ needs.lint-ts.result == 'success' && '✅ Succès' || '❌ Échec' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🦀 Lint Rust : ${{ needs.lint-rust.result == 'success' && '✅ Succès' || '❌ Échec' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🧪 Tests Unitaires : ${{ needs.tests-unit.result == 'success' && '✅ Succès' || '❌ Échec' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 Tests E2E : ${{ needs.tests-e2e.result == 'success' && '✅ Succès' || '❌ Échec' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 *Ce rapport a été généré automatiquement.*" >> $GITHUB_STEP_SUMMARY
